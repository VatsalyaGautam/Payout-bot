services:
    app:
        build: .
        restart: always
        env_file: .env
        depends_on:
            db:
                condition: service_healthy
        environment:
            - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
            - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
            - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID}
            - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
            - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
            - ALERT_DAYS_BEFORE=${ALERT_DAYS_BEFORE:-3}
            - CRON_SCHEDULE=${CRON_SCHEDULE:-0 9 * * *}
            - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
            - DB_POOL_MAX=${DB_POOL_MAX:-10}
            - DB_IDLE_TIMEOUT=${DB_IDLE_TIMEOUT:-20}
            - DB_CONNECT_TIMEOUT=${DB_CONNECT_TIMEOUT:-10}

    db:
        image: postgres:16-alpine
        restart: always
        environment:
            - POSTGRES_USER=${POSTGRES_USER:-bot}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bot}
            - POSTGRES_DB=${POSTGRES_DB:-payouts}
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test:
                ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
